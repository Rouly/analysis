name: Build Windows EXE

# 触发：手动点击，或推送 tag（如 v0.1.0）时自动构建
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest      # 云端 Windows 服务器
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装前端依赖
        run: npm install

      - name: 安装后端依赖
        run: pip install websockets pyinstaller

      - name: 打包 Python 后端 (server.exe)
        run: npm run build:backend

      - name: 打包 Electron 安装包
        run: npm run dist

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: SalesReplay-Windows
          path: dist/*.exe

      # 推送 tag 时，自动发布到 Releases，方便直接下载
      - name: 发布到 Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
